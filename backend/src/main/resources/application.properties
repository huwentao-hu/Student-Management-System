spring.application.name=student-management
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/student_management}
spring.datasource.username=${DB_USERNAME:student_admin}
spring.datasource.password=${DB_PASSWORD:student_password}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
server.port=${SERVER_PORT:8080}
app.auth.token-ttl-hours=${AUTH_TOKEN_TTL_HOURS:8}
app.auth.token-cleanup-interval-ms=${AUTH_TOKEN_CLEANUP_INTERVAL_MS:3600000}
app.auth.token-cleanup-initial-delay-ms=${AUTH_TOKEN_CLEANUP_INITIAL_DELAY_MS:3600000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.bootstrap-admin.username=${BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
