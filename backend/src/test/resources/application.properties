spring.datasource.url=jdbc:h2:mem:student_management;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
app.auth.token-ttl-hours=8
app.auth.token-cleanup-interval-ms=86400000
app.auth.token-cleanup-initial-delay-ms=86400000
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
app.bootstrap-admin.username=admin
app.bootstrap-admin.password=
