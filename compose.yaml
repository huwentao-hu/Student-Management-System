name: student-management

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: student_management
      POSTGRES_USER: student_admin
      POSTGRES_PASSWORD: student_password
    ports:
      - "5432:5432"
    volumes:
      - student_management_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_admin -d student_management"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  student_management_postgres:
